[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 500
  metric_buffer_limit = 5000
  flush_interval = "10s"
  flush_jitter = "1s"
  precision = "1s"
  hostname = "telegraf"
  omit_hostname = true

###############################################################################
# INPUT: Fronius Power Flow
###############################################################################
[[inputs.http]]
  urls = ["${FRONIUS_POWERFLOW_URL}"]
  method = "GET"
  timeout = "5s"
  data_format = "json_v2"
  name_override = "fronius_powerflow"

  [[inputs.http.json_v2]]
    measurement_name = "powerflow"

    [[inputs.http.json_v2.field]]
      path = "Body.Data.Site.P_PV"
      type = "float"
      rename = "pv_w"

    [[inputs.http.json_v2.field]]
      path = "Body.Data.Site.P_Grid"
      type = "float"
      rename = "grid_w"

    [[inputs.http.json_v2.field]]
      path = "Body.Data.Site.P_Load"
      type = "float"
      rename = "load_w"

    [[inputs.http.json_v2.field]]
      path = "Body.Data.Site.rel_Autonomy"
      type = "float"
      rename = "autonomy_pct"

    [[inputs.http.json_v2.field]]
      path = "Body.Data.Site.rel_SelfConsumption"
      type = "float"
      rename = "self_consumption_pct"

###############################################################################
# INPUT: Fronius Smart Meter (system scope)
###############################################################################
[[inputs.http]]
  urls = ["${FRONIUS_METER_URL}"]
  method = "GET"
  timeout = "5s"
  data_format = "json_v2"
  name_override = "fronius_meter"

  [[inputs.http.json_v2]]
    measurement_name = "meter"

    [[inputs.http.json_v2.field]]
      path = "Body.Data.0.PowerReal_P_Sum"
      type = "float"
      rename = "p_sum_w"

    [[inputs.http.json_v2.field]]
      path = "Body.Data.0.PowerReactive_Q_Sum"
      type = "float"
      rename = "q_sum_var"

    [[inputs.http.json_v2.field]]
      path = "Body.Data.0.PowerApparent_S_Sum"
      type = "float"
      rename = "s_sum_va"

    [[inputs.http.json_v2.field]]
      path = "Body.Data.0.PowerFactor_Sum"
      type = "float"
      rename = "pf_sum"

    [[inputs.http.json_v2.field]]
      path = "Body.Data.0.EnergyReal_WAC_Sum_Consumed"
      type = "float"
      rename = "e_consumed_wh"

    [[inputs.http.json_v2.field]]
      path = "Body.Data.0.EnergyReal_WAC_Sum_Produced"
      type = "float"
      rename = "e_produced_wh"

###############################################################################
# OUTPUT: InfluxDB v2
###############################################################################
[[outputs.influxdb_v2]]
  urls = ["${INFLUX_URL}"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"